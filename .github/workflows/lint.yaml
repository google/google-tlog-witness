name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: 'go.mod'

      - name: Check Go formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            echo ""
            echo "Run 'gofmt -w .' to fix."
            exit 1
          fi

  license-headers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: 'go.mod'

      - name: Check license headers
        run: go run github.com/google/addlicense@v1.2.0 -check -s=only .

  gazelle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-gazelle
          repository-cache: true

      - name: Check BUILD files are up-to-date
        run: |
          DIFF=$(bazel run //:gazelle -- update -mode diff 2>/dev/null)
          if [ -n "$DIFF" ]; then
            echo "::error::BUILD files are out of date. Run 'bazel run //:gazelle' to regenerate."
            echo "$DIFF"
            exit 1
          fi
